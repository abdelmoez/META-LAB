version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: metalab
      POSTGRES_PASSWORD: metalab_local
      POSTGRES_DB: metalab_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metalab -d metalab_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
