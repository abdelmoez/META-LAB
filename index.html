<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy is delivered as a real HTTP RESPONSE HEADER by the
      server (server/security/csp.js, prompt 51) — NOT a <meta> tag. A header can
      express frame-ancestors, report-to/report-uri and per-response nonces that a
      <meta> cannot, and supports report-only ↔ enforce rollout via CSP_MODE.
      The bootstrap <script> below is authorized by its SHA-256 hash; the server-
      injected theme <script> by a per-response nonce. See docs/manager/csp-security.md.
    -->
    <title>PecanRev — Systematic Review &amp; Meta-Analysis Platform</title>
    <meta
      name="description"
      content="PecanRev is a systematic review and meta-analysis platform with screening, data extraction, risk of bias, search building, project collaboration, and a complete review workflow."
    />
    <link rel="canonical" href="https://pecanrev.com/" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Open Graph -->
    <meta property="og:title" content="PecanRev — Systematic Review &amp; Meta-Analysis Platform" />
    <meta
      property="og:description"
      content="PecanRev is a systematic review and meta-analysis platform with screening, data extraction, risk of bias, search building, project collaboration, and a complete review workflow."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PecanRev" />
    <meta property="og:url" content="https://pecanrev.com" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PecanRev — Systematic Review &amp; Meta-Analysis Platform" />
    <meta
      name="twitter:description"
      content="PecanRev is a systematic review and meta-analysis platform with screening, data extraction, risk of bias, search building, project collaboration, and a complete review workflow."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Theme bootstrap — set data-theme before first paint to avoid a flash.
      // Priority: explicit per-user choice (localStorage) > the site default the
      // Node server injects (window.__METALAB_DEFAULT_THEME__) > day.
      try {
        var t = localStorage.getItem('metalab_theme');
        if (t !== 'night' && t !== 'day') {
          var sd = window.__METALAB_DEFAULT_THEME__;
          t = (sd === 'night' || sd === 'day') ? sd : 'day';
        }
        document.documentElement.dataset.theme = t === 'night' ? 'night' : 'day';
      } catch (e) { document.documentElement.dataset.theme = 'day'; }
      // Brand-color bootstrap (prompt37) — apply the global accent palette as
      // inline custom properties BEFORE first paint so a custom brand never
      // flashes the default indigo, even for first-time visitors. The four tokens
      // re-skin the whole app and are theme-specific (pick the side matching the
      // data-theme set above). Priority: the server-injected CURRENT brand
      // (window.__METALAB_BRAND__ — freshest, set when the Node server serves
      // index.html) > the localStorage cache (returning visitors) > none.
      try {
        var bRaw = localStorage.getItem('metalab_brand');
        var b = window.__METALAB_BRAND__ || (bRaw ? JSON.parse(bRaw) : null);
        var side = b && b.palette && b.palette[document.documentElement.dataset.theme];
        if (side) {
          var map = { acc: '--t-acc', acc2: '--t-acc2', accText: '--t-acc-text', accBg: '--t-acc-bg' };
          var HEX = /^#[0-9a-fA-F]{6}$/;
          for (var k in map) if (HEX.test(side[k] || '')) document.documentElement.style.setProperty(map[k], side[k]);
        }
      } catch (e) { /* no brand info → stylesheet default indigo */ }
      // Design-mode bootstrap (design.md) — set data-ui-design before first paint
      // so an admin's chosen UI (legacy | stitch) is correct on the very first
      // frame (no flash). Priority: ?ui= override > localStorage cache > legacy.
      // This only sets an attribute; the Stitch stylesheet + bundle activate later
      // and ONLY for an authenticated admin (DesignModeProvider re-resolves and
      // forces legacy for everyone else), so this can never expose the preview.
      try {
        var uiVALID = { legacy: 1, stitch: 1 };
        var uiMode = null;
        try {
          var uiQ = new URLSearchParams(window.location.search).get('ui');
          if (uiQ && uiVALID[uiQ.toLowerCase()]) uiMode = uiQ.toLowerCase();
        } catch (e2) {}
        if (!uiMode) {
          var uiSaved = localStorage.getItem('metalab_ui_design');
          if (uiSaved && uiVALID[uiSaved]) uiMode = uiSaved;
        }
        document.documentElement.dataset.uiDesign = uiMode || 'legacy';
      } catch (e) { document.documentElement.dataset.uiDesign = 'legacy'; }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      body { background: #f6f7f9; color: #1f2937; font-family: 'Inter', 'IBM Plex Sans', system-ui, sans-serif; }
      html[data-theme="night"] body { background: #0b1120; color: #f1f5f9; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
