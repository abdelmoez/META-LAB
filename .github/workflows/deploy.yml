name: Deploy to VPS
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}
# 86.md P1.3 — event-scoped concurrency. A single shared 'production-deploy' group
# let any PR run evict a QUEUED production deploy (GitHub keeps one pending run per
# group). PR runs now group per-PR (and cancel their own stale runs); only main-push
# deploys share the serialized production slot.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'production-deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  # ── Test gate (roadmap 0.1) ────────────────────────────────────────────────
  # Runs the hermetic, server-free suite (research-engine statistics golden
  # tests + all pure unit/screening-unit tests) on every push and PR. The deploy
  # job `needs:` this, so a failing statistics/unit test provably blocks a
  # production deploy. Integration tests that require a live API on :3001 are NOT
  # part of this gate (they need a running server + seeded DB); see roadmap
  # Phase-0 analysis for the recommended follow-up to run them in CI too.
  test:
    name: Test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so the engine-version check can diff HEAD against its parent.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm ci
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server
        env:
          DATABASE_URL: "file:./dev.db"
      - name: Lint (86.md P3.22 — plain-JS bug rules; green today)
        run: npm run lint
      - name: Run hermetic test gate
        run: npm run test:ci
      # 54.md Part 5 — detect engine-affecting changes + classify them. INFORMATIONAL
      # only: it never writes versions during PR/push validation (DB-backed bumps run
      # in the controlled post-merge/release step, so there is no recursive-commit
      # risk). Flip to `--strict` to make malformed declarations / ambiguous ownership
      # block the pipeline once the ownership map is fully settled.
      - name: Engine version check (informational)
        run: npm run engine-version:check || true

  # ── Integration suite (86.md P1.4) ─────────────────────────────────────────
  # The ~704 integration cases hit a LIVE API on :3001 and SELF-SKIP when it is
  # down, so a green `vitest run tests/integration` proved nothing and no workflow
  # ever booted a server for them — the whole suite was permanently un-gated. This
  # job boots the API against a FRESH ephemeral SQLite DB (a clean DB is essential:
  # many cases assume no prior state) and runs the suite in the deterministic serial
  # mode the files require (--pool=forks singleFork). The boot step curls /api/health
  # and FAILS the job if the API is not up within 30s, so the suite never runs against
  # a down server (which is what let a green run silently prove nothing).
  #
  # NON-GATING for now: deploy does NOT `need:` this job, mirroring playwright.yml —
  # it runs and reports on every push/PR so regressions are visible, and should be
  # promoted to a deploy gate (add it to deploy's `needs:`) once proven green in CI.
  integration:
    name: Integration suite (report-only)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: 'file:./dev.db'
      BETA_WAITLIST_DATABASE_URL: 'file:./waitlist.db'
      JWT_SECRET: 'ci-only-jwt-secret-not-used-anywhere-real'
      ADMIN_EMAIL_1: 'ci-admin-1@example.com'
      ADMIN_EMAIL_2: 'ci-admin-2@example.com'
      ADMIN_SEED_PASSWORD: 'ci-only-seed-password-123'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm ci
      - name: Install server dependencies (generates Prisma clients)
        run: npm ci
        working-directory: server
      - name: Create database schema (fresh)
        run: npx prisma db push --schema=prisma/schema.prisma --skip-generate
        working-directory: server
      - name: Create waitlist database schema (fresh)
        run: npx prisma db push --schema=prisma/waitlist/schema.prisma --skip-generate
        working-directory: server
      - name: Boot API server
        run: |
          node server/index.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/api/health >/dev/null; then echo "API is up"; exit 0; fi
            echo "waiting for API ($i)…"; sleep 1
          done
          echo "API did not come up on :3001"; exit 1
      - name: Run integration suite (serial, deterministic)
        run: npx vitest run tests/integration tests/screening/integration --pool=forks --poolOptions.forks.singleFork=true
      - name: Stop API server
        if: always()
        run: '[ -n "$SERVER_PID" ] && kill "$SERVER_PID" || true'

  # ── Integration suite on PostgreSQL (93.md §4.8) ───────────────────────────
  # Mirrors the SQLite `integration` job above, but boots the API with
  # DATABASE_PROVIDER=postgres against a postgres:16 service container and
  # applies the COMMITTED baseline migrations with `prisma migrate deploy` —
  # i.e. exactly the path a real Postgres deployment takes (no `db push`).
  # Layout note: both Postgres schemas live in server/prisma/postgres/, so the
  # main schema owns the sibling `migrations/` dir and the waitlist keeps its
  # own `waitlist-migrations/` dir; Prisma only looks for a dir literally named
  # `migrations` next to the schema, so the waitlist deploy step stages that
  # expected layout in a temp dir first.
  # NON-GATING (continue-on-error) while it is proven out in CI — promote it by
  # removing continue-on-error and adding it to deploy's `needs:` once green.
  integration-postgres:
    name: Integration suite on Postgres (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true # TODO(93.md): promote to a gate once proven green
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pecanrev_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_PROVIDER: 'postgres'
      # Unused at runtime under provider=postgres; kept so any script that
      # defensively reads DATABASE_URL (e.g. sqlite prisma generate) still works.
      DATABASE_URL: 'file:./dev.db'
      POSTGRES_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_test'
      POSTGRES_DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_test'
      # Waitlist stays STRICTLY separate — second database on the same service.
      # Review fix (round 2): the waitlist URLs are STEP-level (not job-level)
      # on purpose. `npm ci` in server/ runs the ensure-waitlist-db postinstall,
      # which would try to `db push` a PG waitlist database that (a) does not
      # exist yet at install time and (b) once pushed would make the later
      # `migrate deploy` fail with P3005 (non-empty schema, no history). With
      # the URL unset during install, postinstall takes its harmless local
      # sqlite fallback and the baseline migrations get a clean, empty DB.
      JWT_SECRET: 'ci-only-jwt-secret-not-used-anywhere-real'
      ADMIN_EMAIL_1: 'ci-admin-1@example.com'
      ADMIN_EMAIL_2: 'ci-admin-2@example.com'
      ADMIN_SEED_PASSWORD: 'ci-only-seed-password-123'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm ci
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Create waitlist database (second DB on the same service)
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres \
            -c 'CREATE DATABASE pecanrev_waitlist_test;'
      - name: Generate Postgres Prisma clients
        run: npm run db:generate:postgres
        working-directory: server
      - name: Apply main schema (baseline migrations — prisma migrate deploy)
        run: npx prisma migrate deploy --schema=prisma/postgres/schema.prisma
        working-directory: server
      - name: Apply waitlist schema (baseline migrations — prisma migrate deploy)
        # Stage the layout Prisma expects (schema.prisma + sibling migrations/)
        # from the committed waitlist-schema.prisma + waitlist-migrations/.
        # `migrate deploy` never runs generators, so the copied schema's relative
        # generator output path is irrelevant here.
        run: |
          mkdir -p /tmp/waitlist-deploy
          cp prisma/postgres/waitlist-schema.prisma /tmp/waitlist-deploy/schema.prisma
          cp -r prisma/postgres/waitlist-migrations /tmp/waitlist-deploy/migrations
          npx prisma migrate deploy --schema=/tmp/waitlist-deploy/schema.prisma
        working-directory: server
        env:
          POSTGRES_WAITLIST_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_waitlist_test'
          POSTGRES_WAITLIST_DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_waitlist_test'
      - name: Boot API server (Postgres)
        env:
          BETA_WAITLIST_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_waitlist_test'
          POSTGRES_WAITLIST_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_waitlist_test'
          POSTGRES_WAITLIST_DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_waitlist_test'
        run: |
          node server/index.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/api/health >/dev/null; then echo "API is up"; exit 0; fi
            echo "waiting for API ($i)…"; sleep 1
          done
          echo "API did not come up on :3001"; exit 1
      - name: Run integration suite (serial, deterministic)
        env:
          BETA_WAITLIST_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_waitlist_test'
          POSTGRES_WAITLIST_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_waitlist_test'
          POSTGRES_WAITLIST_DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/pecanrev_waitlist_test'
        run: npx vitest run tests/integration tests/screening/integration --pool=forks --poolOptions.forks.singleFork=true
      - name: Stop API server
        if: always()
        run: '[ -n "$SERVER_PID" ] && kill "$SERVER_PID" || true'

  # ── Deploy (only on push to main / manual dispatch; never on PRs) ──────────
  deploy:
    name: Deploy over SSH
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: bash /usr/local/bin/metalab-deploy.sh

      # ── Post-deploy smoke test (prompt49 §11) ──────────────────────────────
      # Hits the live deployment: health, readiness (DB), version (matches the
      # deployed commit), a protected route's 401, and public settings. Retries
      # a few times to allow the service to come up, then fails the workflow if
      # the deployment is unhealthy (so the failure is visible in deploy logs).
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post-deploy smoke test
        env:
          SMOKE_BASE: ${{ secrets.SMOKE_BASE }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          EXPECT_COMMIT: ${{ github.sha }}
        run: |
          BASE="${SMOKE_BASE:-https://${VPS_HOST}}"
          echo "Smoke testing $BASE"
          for i in 1 2 3 4 5; do
            if SMOKE_BASE="$BASE" node scripts/smoke-deploy.mjs; then exit 0; fi
            echo "smoke attempt $i failed; retrying in 10s…"; sleep 10
          done
          echo "Post-deploy smoke test failed after retries"; exit 1
