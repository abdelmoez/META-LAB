name: Deploy to VPS
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}
# 86.md P1.3 — event-scoped concurrency. A single shared 'production-deploy' group
# let any PR run evict a QUEUED production deploy (GitHub keeps one pending run per
# group). PR runs now group per-PR (and cancel their own stale runs); only main-push
# deploys share the serialized production slot.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'production-deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  # ── Test gate (roadmap 0.1) ────────────────────────────────────────────────
  # Runs the hermetic, server-free suite (research-engine statistics golden
  # tests + all pure unit/screening-unit tests) on every push and PR. The deploy
  # job `needs:` this, so a failing statistics/unit test provably blocks a
  # production deploy. Integration tests that require a live API on :3001 are NOT
  # part of this gate (they need a running server + seeded DB); see roadmap
  # Phase-0 analysis for the recommended follow-up to run them in CI too.
  test:
    name: Test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so the engine-version check can diff HEAD against its parent.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm ci
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server
        env:
          DATABASE_URL: "file:./dev.db"
      - name: Lint (86.md P3.22 — plain-JS bug rules; green today)
        run: npm run lint
      - name: Run hermetic test gate
        run: npm run test:ci
      # 54.md Part 5 — detect engine-affecting changes + classify them. INFORMATIONAL
      # only: it never writes versions during PR/push validation (DB-backed bumps run
      # in the controlled post-merge/release step, so there is no recursive-commit
      # risk). Flip to `--strict` to make malformed declarations / ambiguous ownership
      # block the pipeline once the ownership map is fully settled.
      - name: Engine version check (informational)
        run: npm run engine-version:check || true

  # ── Integration suite (86.md P1.4) ─────────────────────────────────────────
  # The ~704 integration cases hit a LIVE API on :3001 and SELF-SKIP when it is
  # down, so a green `vitest run tests/integration` proved nothing and no workflow
  # ever booted a server for them — the whole suite was permanently un-gated. This
  # job boots the API against a FRESH ephemeral SQLite DB (a clean DB is essential:
  # many cases assume no prior state) and runs the suite in the deterministic serial
  # mode the files require (--pool=forks singleFork). The boot step curls /api/health
  # and FAILS the job if the API is not up within 30s, so the suite never runs against
  # a down server (which is what let a green run silently prove nothing).
  #
  # NON-GATING for now: deploy does NOT `need:` this job, mirroring playwright.yml —
  # it runs and reports on every push/PR so regressions are visible, and should be
  # promoted to a deploy gate (add it to deploy's `needs:`) once proven green in CI.
  integration:
    name: Integration suite (report-only)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: 'file:./dev.db'
      BETA_WAITLIST_DATABASE_URL: 'file:./waitlist.db'
      JWT_SECRET: 'ci-only-jwt-secret-not-used-anywhere-real'
      ADMIN_EMAIL_1: 'ci-admin-1@example.com'
      ADMIN_EMAIL_2: 'ci-admin-2@example.com'
      ADMIN_SEED_PASSWORD: 'ci-only-seed-password-123'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm ci
      - name: Install server dependencies (generates Prisma clients)
        run: npm ci
        working-directory: server
      - name: Create database schema (fresh)
        run: npx prisma db push --schema=prisma/schema.prisma --skip-generate
        working-directory: server
      - name: Create waitlist database schema (fresh)
        run: npx prisma db push --schema=prisma/waitlist/schema.prisma --skip-generate
        working-directory: server
      - name: Boot API server
        run: |
          node server/index.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/api/health >/dev/null; then echo "API is up"; exit 0; fi
            echo "waiting for API ($i)…"; sleep 1
          done
          echo "API did not come up on :3001"; exit 1
      - name: Run integration suite (serial, deterministic)
        run: npx vitest run tests/integration tests/screening/integration --pool=forks --poolOptions.forks.singleFork=true
      - name: Stop API server
        if: always()
        run: '[ -n "$SERVER_PID" ] && kill "$SERVER_PID" || true'

  # ── Deploy (only on push to main / manual dispatch; never on PRs) ──────────
  deploy:
    name: Deploy over SSH
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: bash /usr/local/bin/metalab-deploy.sh

      # ── Post-deploy smoke test (prompt49 §11) ──────────────────────────────
      # Hits the live deployment: health, readiness (DB), version (matches the
      # deployed commit), a protected route's 401, and public settings. Retries
      # a few times to allow the service to come up, then fails the workflow if
      # the deployment is unhealthy (so the failure is visible in deploy logs).
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post-deploy smoke test
        env:
          SMOKE_BASE: ${{ secrets.SMOKE_BASE }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          EXPECT_COMMIT: ${{ github.sha }}
        run: |
          BASE="${SMOKE_BASE:-https://${VPS_HOST}}"
          echo "Smoke testing $BASE"
          for i in 1 2 3 4 5; do
            if SMOKE_BASE="$BASE" node scripts/smoke-deploy.mjs; then exit 0; fi
            echo "smoke attempt $i failed; retrying in 10s…"; sleep 10
          done
          echo "Post-deploy smoke test failed after retries"; exit 1
